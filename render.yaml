services:
  # PostgreSQL Database
  - type: pserv
    name: appointments-db
    env: docker
    plan: free
    region: oregon
    databases:
      - name: appointments
        user: appointments_user

  # Spring Boot Backend
  - type: web
    name: appointments-backend
    env: java
    plan: free
    region: oregon
    buildCommand: cd backend/appointments && mvn clean package -DskipTests
    startCommand: java -jar backend/appointments/target/appointments-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/services
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: appointments-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: appointments-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: appointments-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_MAIL_USERNAME
        sync: false  # Set manually in Render dashboard
      - key: SPRING_MAIL_PASSWORD
        sync: false  # Set manually in Render dashboard

  # React Frontend
  - type: web
    name: appointments-frontend
    env: static
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
